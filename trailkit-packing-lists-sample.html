<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TrailKit — Packing Lists</title>
<style>
  :root{--bg:#0f1419;--card:#141c24;--border:#1e2d3d;--border-bright:#2a4060;
    --teal:#00c8b4;--amber:#f5a623;--text:#d4dfe9;--dim:#6a8aa0;--deep:#0a0e12;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);
    padding:32px 24px;max-width:800px;margin:0 auto;}
  .page-header{border-bottom:2px solid var(--teal);padding-bottom:16px;margin-bottom:32px;}
  .page-title{font-size:28px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
    color:var(--teal);font-family:'Courier New',monospace;}
  .page-title span{color:var(--dim);font-weight:400;}
  .page-date{font-size:11px;color:var(--dim);letter-spacing:1px;margin-top:4px;}
  .loadout-block{background:var(--card);border:1px solid var(--border);border-radius:6px;
    padding:20px 24px;margin-bottom:20px;page-break-inside:avoid;}
  .loadout-activity{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
    color:var(--dim);margin-bottom:6px;}
  .loadout-name{font-size:22px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
    color:var(--text);font-family:'Courier New',monospace;margin-bottom:16px;
    border-bottom:1px solid var(--border-bright);padding-bottom:10px;}
  .item-list{list-style:none;display:flex;flex-direction:column;gap:2px;}
  .item-row{display:flex;align-items:center;gap:12px;padding:7px 0;
    border-bottom:1px solid rgba(30,45,61,0.6);}
  .item-row:last-child{border-bottom:none;}
  .item-cb{width:18px;height:18px;border:2px solid var(--border-bright);border-radius:3px;
    flex-shrink:0;cursor:pointer;appearance:none;-webkit-appearance:none;background:var(--deep);
    transition:all 0.15s;}
  .item-cb:checked{background:var(--teal);border-color:var(--teal);}
  .item-cb:checked::after{content:'✓';display:block;color:#0a0e12;font-weight:900;
    font-size:12px;line-height:16px;text-align:center;}
  .item-label{font-size:14px;color:var(--text);cursor:pointer;user-select:none;flex:1;}
  input:checked + .item-label{text-decoration:line-through;color:var(--dim);}
  .no-loadouts{color:var(--dim);font-size:13px;font-style:italic;text-align:center;
    padding:40px;border:1px dashed var(--border);border-radius:6px;}
  .sport-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1.5px;
    text-transform:uppercase;padding:2px 8px;border-radius:2px;margin-bottom:8px;}
  .sport-hike{background:#2a7a4b;color:#7dffb4;}
  .sport-bike{background:#1a5c8a;color:#7dd4ff;}
  .sport-run{background:#8a4a1a;color:#ffb47d;}
  .sport-climb{background:#7a3a8a;color:#d4a0ff;}
  .sport-moto{background:#5a3a1a;color:#ffcc7d;}
  .sport-camp{background:#1a3a5c;color:#aae8ff;}
  @media print{
    body{background:#fff;color:#000;padding:16px;}
    .loadout-block{border:1px solid #ccc;background:#fff;}
    .loadout-activity,.loadout-name{color:#000;}
    .item-label{color:#000;}
    .page-title{color:#000;}
    .page-date{color:#555;}
  }
</style>
</head>
